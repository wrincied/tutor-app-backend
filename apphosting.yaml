# Firebase App Hosting — Node.js API (tutor-app-backend)
# https://tutor-app-backend--tutorassis.europe-west4.hosted.app
runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

# Разрешённые фронтенды для CORS (comma-separated).
env:
  - variable: FRONTEND_URL
    value: >-
      https://tutor-app--tutorassis.europe-west4.hosted.app,
      https://simple4u-64822.web.app,
      https://simple4u-64822.firebaseapp.com,
      https://tutorassis.web.app,
      https://tutorassis.firebaseapp.com,
      https://wrincied.github.io
    availability:
      - RUNTIME

# Секреты (JWT, Stripe, Firebase SA) задайте в Firebase Console → App Hosting → Environment.